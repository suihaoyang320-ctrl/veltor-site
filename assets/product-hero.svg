    <!-- :� -->
    <rect x="155" y="148" width="110" height="320" rx="8" fill="url(#bodyGrad)" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <!-- �Ia -->
    <rect x="168" y="160" width="6" height="290" rx="3" fill="#fff" opacity="0.06"/>
    <rect x="246" y="180" width="4" height="250" rx="2" fill="#fff" opacity="0.03"/>
    <!-- �r� -->
    <ellipse cx="210" cy="280" rx="42" ry="42" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.35"/>
    <ellipse cx="210" cy="280" rx="32" ry="32" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.2"/>
    <!-- Logo -->
    <text x="210" y="295" text-anchor="middle" fill="url(#goldGrad)" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="4">VELTOR</text>
    <!-- v� -->
    <rect x="168" y="108" width="84" height="44" rx="6" fill="url(#capGrad)" stroke="url(#goldGrad)" stroke-width="1"/>
    <rect x="178" y="118" width="64" height="8" rx="2" fill="#c9a962" opacity="0.15"/>
    <!-- �:o -->
    <circle cx="210" cy="132" r="4" fill="#c9a962" opacity="0.7" filter="url(#softGlow)"/>
  </g>
  <!-- ��I -->
