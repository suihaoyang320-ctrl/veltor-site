<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 560" fill="none">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="25%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#4a4a4a"/>
      <stop offset="75%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5a3"/>
      <stop offset="50%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#8a7340"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#c9a962" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a962" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 0bIU -->
  <ellipse cx="210" cy="500" rx="140" ry="28" fill="url(#glowGrad)"/>
