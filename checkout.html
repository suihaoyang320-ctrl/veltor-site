<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VELTOR 结账 — 安全完成您的订单。">
  <title>结账 · VELTOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="nav nav--scrolled" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">VELTOR</a>
      <nav class="nav__links">
        <a href="index.html">首页</a>
        <a href="product.html">产品</a>
      </nav>
    </div>
  </header>

  <main class="checkout-page">
    <div class="checkout-page__inner">
      <h1 class="checkout-page__title">结账</h1>

      <form class="checkout-form" id="checkoutForm" novalidate>
        <!-- ① 订单摘要 -->
        <section class="checkout-section">
          <h2 class="checkout-section__title">订单摘要</h2>
          <div class="checkout-summary" id="checkoutSummary">
            <img class="checkout-summary__img" src="assets/product-hero.svg" alt="VELTOR 车载香薰" width="80" height="106">
            <div class="checkout-summary__info">
              <p class="checkout-summary__name" id="summaryName">VELTOR 车载香薰</p>
              <p class="checkout-summary__scent" id="summaryScent">冷杉木质</p>
              <p class="checkout-summary__qty">数量：<span id="summaryQty">1</span></p>
            </div>
            <p class="checkout-summary__total" id="summaryTotal">¥699</p>
          </div>
        </section>

        <!-- ② 收货信息 -->
        <section class="checkout-section">
          <h2 class="checkout-section__title">收货信息</h2>
          <div class="checkout-fields">
            <label class="checkout-field">
              <span class="checkout-field__label">姓名</span>
              <input class="checkout-field__input" type="text" name="name" id="fieldName" placeholder="请输入收货人姓名" required autocomplete="name">
            </label>
            <label class="checkout-field">
              <span class="checkout-field__label">手机号</span>
              <input class="checkout-field__input" type="tel" name="phone" id="fieldPhone" placeholder="11 位手机号码" required autocomplete="tel" pattern="^1[3-9]\d{9}$">
            </label>
            <label class="checkout-field">
              <span class="checkout-field__label">地址</span>
              <textarea class="checkout-field__input checkout-field__textarea" name="address" id="fieldAddress" placeholder="省市区 + 详细地址" required rows="3"></textarea>
            </label>
          </div>
        </section>

        <!-- ③ 配送方式 -->
        <section class="checkout-section">
          <h2 class="checkout-section__title">配送方式</h2>
          <div class="checkout-options" id="shippingOptions">
            <label class="checkout-option">
              <input type="radio" name="shipping" value="standard" checked>
              <span class="checkout-option__box">
                <span class="checkout-option__name">标准配送</span>
                <span class="checkout-option__desc">顺丰包邮 · 3–5 个工作日</span>
              </span>
            </label>
            <label class="checkout-option">
              <input type="radio" name="shipping" value="express">
              <span class="checkout-option__box">
                <span class="checkout-option__name">极速配送</span>
                <span class="checkout-option__desc">同城当日达 · 1–2 个工作日</span>
              </span>
            </label>
          </div>
        </section>

        <!-- ④ 支付方式 -->
        <section class="checkout-section">
          <h2 class="checkout-section__title">支付方式</h2>
          <div class="checkout-options" id="paymentOptions">
            <label class="checkout-option">
              <input type="radio" name="payment" value="apple" checked>
              <span class="checkout-option__box">
                <span class="checkout-option__name">Apple Pay</span>
              </span>
            </label>
            <label class="checkout-option">
              <input type="radio" name="payment" value="alipayMethod">
              <span class="checkout-option__box">
                <span class="checkout-option__name">支付宝</span>
              </span>
            </label>
            <label class="checkout-option">
              <input type="radio" name="payment" value="wechat">
              <span class="checkout-option__box">
                <span class="checkout-option__name">微信支付</span>
              </span>
            </label>
            <label class="checkout-option">
              <input type="radio" name="payment" value="card">
              <span class="checkout-option__box">
                <span class="checkout-option__name">银行卡</span>
              </span>
            </label>
          </div>
        </section>

        <!-- ⑤ 提交订单 -->
        <button type="submit" class="btn btn--glass btn--glass-gold checkout-submit" id="submitOrder">提交订单 · <span id="submitTotal">¥699</span></button>
      </form>
    </div>
  </main>

  <footer class="footer footer--minimal">
    <div class="footer__bottom">
      <p>&copy; 2026 VELTOR</p>
    </div>
  </footer>

  <script src="checkout.js"></script>
</body>
</html>
