<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function (REPO) {
      var p = location.pathname;
      var base = (p === REPO || p.indexOf(REPO + '/') === 0)
        ? REPO + '/'
        : (p.indexOf('.') > -1 ? p.slice(0, p.lastIndexOf('/') + 1) : (p.endsWith('/') ? p : p + '/'));
      var el = document.createElement('base');
      el.href = base;
      document.head.insertBefore(el, document.head.firstChild);
      window.VELTOR_BASE = base;
      window.veltorPage = function (path) { return base + String(path).replace(/^\//, ''); };
      var isGhPages = p === REPO || p.indexOf(REPO + '/') === 0;
      window.veltorLogoImg = isGhPages ? 'images/logo-main.png' : 'public/images/logo-main.png';
    })('/veltor-site');
  </script>
  <meta name="description" content="VELTOR 订单已成功创建。">
  <title>下单成功 · VELTOR</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="nav nav--scrolled">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo" aria-label="VELTOR">
        <img class="nav__logo-img nav__logo-img--lg" data-veltor-logo src="public/images/logo-main.png" alt="VELTOR" height="42">
      </a>
    </div>
  </header>

  <main class="success-page">
    <div class="success-page__inner">
      <img class="success-page__logo" data-veltor-logo src="public/images/logo-main.png" alt="VELTOR">
      <p class="success-page__thanks">感谢选择 VELTOR</p>
      <div class="success-page__icon">✓</div>
      <h1 class="success-page__title">订单已创建</h1>
      <p class="success-page__order" id="successOrderId">订单号 VEL-000000</p>
      <p class="success-page__delivery">
        预计送达：<span id="successDelivery">—</span>
      </p>
      <div class="success-page__summary" id="successSummary">
        <p><span>商品</span><span id="successProduct">VELTOR 车载香薰</span></p>
        <p><span>香型</span><span id="successScent">—</span></p>
        <p><span>数量</span><span id="successQty">—</span></p>
        <p class="success-page__total-row"><span>合计</span><span id="successTotal">—</span></p>
      </div>
      <a href="index.html" class="btn btn--gold success-page__btn">继续购物</a>
    </div>
  </main>

  <footer class="footer footer--minimal">
    <div class="footer__bottom">
      <p>&copy; 2026 VELTOR</p>
    </div>
  </footer>

  <script src="brand.js"></script>
  <script src="success.js"></script>
</body>
</html>
